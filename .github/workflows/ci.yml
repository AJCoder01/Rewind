name: Rewind CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: rewind-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rewind_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rewind_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_MIGRATION_URL: postgresql://postgres:rewind-ci-only@127.0.0.1:5432/rewind_ci?sslmode=disable&uselibpqcompat=true
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Strict typecheck
        run: npm run typecheck

      - name: Unit and contract tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Tracked secret scan
        run: npm run security:scan

      - name: Production fake-provider guard
        run: npm run verify:fake-production

      - name: Ephemeral PostgreSQL migration apply and replay
        run: npm run db:verify:ephemeral

      - name: Install Chromium for fixture browser smoke
        run: npx playwright install --with-deps chromium

      - name: Critical fixture browser smoke
        run: npm run test:e2e
